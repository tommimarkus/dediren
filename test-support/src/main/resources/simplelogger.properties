# SLF4J provider configuration for TEST runs (test-support is test-scope everywhere and never
# ships). Mirrors cli/src/main/resources/simplelogger.properties: silent by default, and the sink
# pinned to System.err so a test that asserts on stdout can never see log text.
#
# Raise it for one run with -Dorg.slf4j.simpleLogger.defaultLogLevel=debug — a system property
# overrides this file.
org.slf4j.simpleLogger.defaultLogLevel=off
org.slf4j.simpleLogger.logFile=System.err
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
