name: Dependency Audit

# Non-blocking, scheduled second opinion to the blocking Grype/SBOM gate that
# runs in ci.yml and release.yml. Grype (GitHub Advisory DB / OSV) is the gate
# that fails pull requests and releases; this workflow cross-checks the same
# dependency tree with OWASP Dependency-Check, whose independent NVD-based CPE
# matching occasionally surfaces advisories the Grype database does not.
#
# It is intentionally non-blocking: the scan runs with continue-on-error so a
# real finding (or an NVD API outage) never fails a merge or release, and the
# report is always uploaded for human review. Because it does not gate, it also
# self-heals across NVD outages — no manual re-enable is required when the NVD
# API recovers.

on:
  schedule:
    # Weekly, Thursday 06:00 UTC — offset from Dependabot's Monday run.
    - cron: "0 6 * * 4"
  workflow_dispatch:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  MAVEN_USER_HOME: ${{ github.workspace }}/.cache/maven/user-home

jobs:
  owasp-dependency-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Restore Dependency-Check data
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/dependency-check
          key: dependency-check-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-v2-${{ runner.os }}-

      - name: Check dependency vulnerabilities (non-blocking)
        id: odc
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -ntp -Psecurity-sca -DskipTests package org.owasp:dependency-check-maven:aggregate

      # Persist the NVD database only after a successful scan so a failed/partial
      # update never poisons the cache and traps later runs in a cold-start loop.
      - name: Save Dependency-Check data
        if: steps.odc.outcome == 'success'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/dependency-check
          key: dependency-check-v2-${{ runner.os }}-${{ github.run_id }}

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dependency-check-report
          path: target/dependency-check
          if-no-files-found: warn
          retention-days: 14
