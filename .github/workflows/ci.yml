name: CI

# Lean CI (2026-07 decision): this workflow runs on pull requests only —
# chiefly Dependabot bumps, which have no local validation — plus manual
# dispatch. Direct pushes to main rely on the local verification lanes
# (CLAUDE.md §Verification) and are recorded as ruleset bypass events; every
# tagged release re-runs the full suite and the blocking Grype gate in
# release.yml.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  MAVEN_USER_HOME: ${{ github.workspace }}/.cache/maven/user-home

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check workspace tests
        run: ./mvnw -B -ntp test

      # Pre-merge shrink gate: the bundle ships one ProGuard-shrunk lib jar, and a missing
      # keep rule only fails at the packaged-bundle smoke. Running it here surfaces that on
      # the PR instead of on a tagged release build (unit tests skip: the step above ran them).
      - name: Smoke packaged distribution
        run: ./mvnw -B -ntp -pl dist-tool -am -DskipTests verify -Pdist-smoke

      - name: Check whitespace
        run: git diff --check

  vulnerability-scan:
    # Blocking supply-chain gate: Grype matches the CycloneDX SBOM against the
    # GitHub Advisory DB / OSV (a prebuilt database, not the live NVD API), so it
    # is fast and resilient to NVD outages. Fails the pull request on
    # High/Critical advisories — Dependabot bumps are the main traffic here. The
    # same gate re-runs against every tagged release in release.yml; OWASP
    # Dependency-Check remains available as an on-demand local second opinion
    # (-Psecurity-sca, see README).
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Generate SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Scan SBOM for known vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: target/bom.json
          fail-build: true
          severity-cutoff: high
          output-format: table
