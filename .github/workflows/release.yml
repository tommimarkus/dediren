name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  MAVEN_USER_HOME: ${{ github.workspace }}/.cache/maven/user-home

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check workspace tests
        run: ./mvnw -B -ntp test

      - name: Check whitespace
        run: git diff --check

      # NVD-independent supply-chain gate (Grype + GitHub Advisory DB / OSV)
      # that keeps releases scanned while the dependency-check steps below are
      # paused by the NVD outage. Fails on High/Critical advisories.
      - name: Generate SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Scan SBOM for known vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: target/bom.json
          fail-build: true
          severity-cutoff: high
          output-format: table

      # TEMPORARY: the NVD API is returning 503 across the board, so the OWASP
      # dependency-check NVD data update cannot complete. The three steps below
      # are skipped to unblock releases. Re-enable by removing the `if: false`
      # (and restoring the Save step's `if: success()`) once
      # https://nvd.nist.gov/ recovers.
      - name: Restore Dependency-Check data
        if: false
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/dependency-check
          key: dependency-check-v2-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-v2-${{ runner.os }}-

      - name: Check dependency vulnerabilities
        if: false
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -ntp -Psecurity-sca -DskipTests package org.owasp:dependency-check-maven:aggregate

      # Persist the NVD database only on success so a failed/partial update never
      # poisons the cache and traps later runs in a repeating cold-start failure.
      - name: Save Dependency-Check data
        if: false
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/dependency-check
          key: dependency-check-v2-${{ runner.os }}-${{ github.run_id }}

  build:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils jq

      - name: Build and smoke distribution
        run: ./mvnw -pl dist-tool -am verify -Pdist-smoke

      - name: Capture archive path
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archives < <(find dist -maxdepth 1 -type f -name 'dediren-agent-bundle-*.tar.gz' | sort)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one Java archive, found ${#archives[@]}" >&2
            find dist -maxdepth 1 -type f -name 'dediren-agent-bundle-*.tar.gz' -print >&2
            exit 1
          fi
          echo "path=${archives[0]}" >> "$GITHUB_OUTPUT"

      - name: Attest archive provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.archive.outputs.path }}

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dediren-agent-bundle
          path: ${{ steps.archive.outputs.path }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      attestations: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dediren-agent-bundle
          path: release-artifacts

      - name: Generate SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Verify release assets
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(awk '/<version>/{gsub(/.*<version>|<\/version>.*/, ""); print; exit}' pom.xml)"
          if [[ "$PROJECT_VERSION" != "$VERSION" ]]; then
            echo "Tag version $VERSION does not match Maven project version $PROJECT_VERSION" >&2
            exit 1
          fi

          mkdir -p release-assets
          cp release-artifacts/*.tar.gz release-assets/
          cp target/bom.json "release-assets/dediren-${VERSION}.cdx.json"
          cp target/bom.xml "release-assets/dediren-${VERSION}.cdx.xml"

          tar_count=$(find release-artifacts -maxdepth 1 -type f -name '*.tar.gz' | wc -l)
          if [[ "$tar_count" -ne 1 ]]; then
            echo "Expected exactly one release archive, found $tar_count" >&2
            exit 1
          fi

          bundle="dediren-agent-bundle-${VERSION}"
          archive="release-assets/dediren-agent-bundle-${VERSION}.tar.gz"
          if [[ ! -f "$archive" ]]; then
            echo "Missing release archive: $archive" >&2
            exit 1
          fi

          tar -tzf "$archive" "$bundle/LICENSE" >/dev/null
          tar -tzf "$archive" "$bundle/docs/agent-usage.md" >/dev/null
          tar -xOf "$archive" "$bundle/bundle.json" \
            | jq -e --arg version "$VERSION" \
                '.version == $version and .target == "java"' >/dev/null

          test -s "release-assets/dediren-${VERSION}.cdx.json"
          jq -e '.bomFormat == "CycloneDX" and .metadata.component.name == "dediren"' \
            "release-assets/dediren-${VERSION}.cdx.json" >/dev/null
          test -s "release-assets/dediren-${VERSION}.cdx.xml"

          (
            cd release-assets
            sha256sum *.tar.gz > SHA256SUMS
          )

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for archive in release-assets/*.tar.gz; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/dediren-agent-bundle-${VERSION}.tar.gz" \
            "release-assets/dediren-${VERSION}.cdx.json" \
            "release-assets/dediren-${VERSION}.cdx.xml" \
            release-assets/SHA256SUMS \
            --verify-tag \
            --title "Dediren $GITHUB_REF_NAME" \
            --notes "Dediren agent bundle release."
