name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  MAVEN_USER_HOME: ${{ github.workspace }}/.cache/maven/user-home

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install XML tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check workspace tests
        run: ./mvnw -B -ntp test

      - name: Check whitespace
        run: git diff --check

      - name: Cache Dependency-Check data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/dependency-check
          key: dependency-check-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - name: Check dependency vulnerabilities
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -ntp -Psecurity-sca -DskipTests package org.owasp:dependency-check-maven:aggregate

  build:
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-apple-darwin
            os: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install Linux tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils jq

      - name: Install macOS tools
        if: runner.os == 'macOS'
        run: |
          brew install libxml2 jq
          echo "/opt/homebrew/opt/libxml2/bin" >> "$GITHUB_PATH"

      - name: Build and smoke distribution
        env:
          DEDIREN_DIST_TARGET: ${{ matrix.target }}
        run: ./mvnw -pl dist-tool -am verify -Pdist-smoke

      - name: Attest archive provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/dediren-agent-bundle-*-${{ matrix.target }}.tar.gz

      - name: Upload archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dediren-agent-bundle-${{ matrix.target }}
          path: dist/dediren-agent-bundle-*-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      attestations: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: release-artifacts
          pattern: dediren-agent-bundle-*
          merge-multiple: true

      - name: Generate SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Verify release assets
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(awk '/<version>/{gsub(/.*<version>|<\/version>.*/, ""); print; exit}' pom.xml)"
          if [[ "$PROJECT_VERSION" != "$VERSION" ]]; then
            echo "Tag version $VERSION does not match Maven project version $PROJECT_VERSION" >&2
            exit 1
          fi

          mkdir -p release-assets
          cp release-artifacts/*.tar.gz release-assets/
          cp target/bom.json "release-assets/dediren-${VERSION}.cdx.json"
          cp target/bom.xml "release-assets/dediren-${VERSION}.cdx.xml"

          expected_targets=(
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            aarch64-apple-darwin
          )

          for target in "${expected_targets[@]}"; do
            bundle="dediren-agent-bundle-${VERSION}-${target}"
            archive="release-assets/dediren-agent-bundle-${VERSION}-${target}.tar.gz"
            if [[ ! -f "$archive" ]]; then
              echo "Missing release archive: $archive" >&2
              exit 1
            fi

            tar -tzf "$archive" "$bundle/LICENSE" >/dev/null
            tar -tzf "$archive" "$bundle/docs/agent-usage.md" >/dev/null
            tar -xOf "$archive" "$bundle/bundle.json" \
              | jq -e --arg version "$VERSION" --arg target "$target" \
                  '.version == $version and .target == $target' >/dev/null
          done

          test -s "release-assets/dediren-${VERSION}.cdx.json"
          jq -e '.bomFormat == "CycloneDX" and .metadata.component.name == "dediren"' \
            "release-assets/dediren-${VERSION}.cdx.json" >/dev/null
          test -s "release-assets/dediren-${VERSION}.cdx.xml"

          (
            cd release-assets
            sha256sum *.tar.gz > SHA256SUMS
          )

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for archive in release-assets/*.tar.gz; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/*.tar.gz \
            release-assets/*.cdx.json \
            release-assets/*.cdx.xml \
            release-assets/SHA256SUMS \
            --verify-tag \
            --title "Dediren $GITHUB_REF_NAME" \
            --notes "Dediren agent bundle release."
