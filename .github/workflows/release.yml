name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: "5"
  MAVEN_USER_HOME: ${{ github.workspace }}/.cache/maven/user-home

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Check workspace tests
        run: ./mvnw -B -ntp test

      - name: Check whitespace
        run: git diff --check

      # Blocking supply-chain gate (Grype + GitHub Advisory DB / OSV) that scans
      # every release independently of the live NVD API. Fails on High/Critical
      # advisories.
      - name: Generate SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Scan SBOM for known vulnerabilities
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: target/bom.json
          fail-build: true
          severity-cutoff: high
          output-format: table

  build:
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build and smoke distribution
        run: ./mvnw -pl dist-tool -am verify -Pdist-smoke

      - name: Capture archive path
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t archives < <(find dist -maxdepth 1 -type f -name 'dediren-agent-bundle-*.tar.xz' | sort)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one Java archive, found ${#archives[@]}" >&2
            find dist -maxdepth 1 -type f -name 'dediren-agent-bundle-*.tar.xz' -print >&2
            exit 1
          fi
          echo "path=${archives[0]}" >> "$GITHUB_OUTPUT"

      # Generate the release SBOM inside the attested build job (not the publish
      # job) so it can be a subject of the provenance attestation below. This
      # binds the SBOM to the build and removes the prior regenerate-in-publish
      # drift, where the attached SBOM had no cryptographic tie to the archive
      # (devsecops audit F2).
      - name: Generate release SBOM
        run: ./mvnw -B -ntp -Psbom org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom

      - name: Stage release assets
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(awk '/<version>/{gsub(/.*<version>|<\/version>.*/, ""); print; exit}' pom.xml)"
          mkdir -p release-staging
          cp "${{ steps.archive.outputs.path }}" "release-staging/dediren-agent-bundle-${VERSION}.tar.xz"
          cp target/bom.json "release-staging/dediren-${VERSION}.cdx.json"
          cp target/bom.xml "release-staging/dediren-${VERSION}.cdx.xml"
          # Compute SHA256SUMS here, not in the publish job, so the checksum
          # file can be a subject of the provenance attestation below alongside
          # the files it lists.
          (
            cd release-staging
            sha256sum *.tar.xz *.cdx.json *.cdx.xml > SHA256SUMS
          )

      # Attest the archive, both SBOM serializations, and the SHA256SUMS
      # checksum file together, so each is a verifiable subject of one
      # build-provenance attestation (audit F2).
      - name: Attest release provenance
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-staging/*.tar.xz
            release-staging/*.cdx.json
            release-staging/*.cdx.xml
            release-staging/SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dediren-agent-bundle
          path: |
            release-staging/*.tar.xz
            release-staging/*.cdx.json
            release-staging/*.cdx.xml
            release-staging/SHA256SUMS
          if-no-files-found: error
          retention-days: 14
          compression-level: 0

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      attestations: read
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Maven artifacts
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .cache/maven
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml', '.mvn/wrapper/maven-wrapper.properties') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dediren-agent-bundle
          path: release-artifacts

      - name: Verify release assets
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(awk '/<version>/{gsub(/.*<version>|<\/version>.*/, ""); print; exit}' pom.xml)"
          if [[ "$PROJECT_VERSION" != "$VERSION" ]]; then
            echo "Tag version $VERSION does not match Maven project version $PROJECT_VERSION" >&2
            exit 1
          fi

          mkdir -p release-assets
          cp release-artifacts/*.tar.xz release-assets/
          # The SBOM is built and attested in the `build` job and carried here as
          # an artifact, not regenerated — so the attached SBOM is the attested
          # one (audit F2).
          cp release-artifacts/*.cdx.json "release-assets/dediren-${VERSION}.cdx.json"
          cp release-artifacts/*.cdx.xml "release-assets/dediren-${VERSION}.cdx.xml"

          tar_count=$(find release-artifacts -maxdepth 1 -type f -name '*.tar.xz' | wc -l)
          if [[ "$tar_count" -ne 1 ]]; then
            echo "Expected exactly one release archive, found $tar_count" >&2
            exit 1
          fi

          bundle="dediren-agent-bundle-${VERSION}"
          archive="release-assets/dediren-agent-bundle-${VERSION}.tar.xz"
          if [[ ! -f "$archive" ]]; then
            echo "Missing release archive: $archive" >&2
            exit 1
          fi

          tar -tf "$archive" "$bundle/LICENSE" >/dev/null
          tar -tf "$archive" "$bundle/docs/agent-usage.md" >/dev/null
          tar -xOf "$archive" "$bundle/bundle.json" \
            | jq -e --arg version "$VERSION" \
                '.version == $version and .target == "java"' >/dev/null

          test -s "release-assets/dediren-${VERSION}.cdx.json"
          jq -e '.bomFormat == "CycloneDX" and .metadata.component.name == "dediren"' \
            "release-assets/dediren-${VERSION}.cdx.json" >/dev/null
          test -s "release-assets/dediren-${VERSION}.cdx.xml"

          # SHA256SUMS is generated and attested in the `build` job; carry it
          # here and check the staged assets against it instead of regenerating,
          # so the published checksum file is the attested one and the assets
          # provably match it.
          cp release-artifacts/SHA256SUMS release-assets/SHA256SUMS
          (
            cd release-assets
            sha256sum -c SHA256SUMS
          )

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Verify provenance for every attested subject: the archive, both
          # SBOM serializations, and the SHA256SUMS checksum file (audit F2).
          for asset in release-assets/*.tar.xz release-assets/*.cdx.json release-assets/*.cdx.xml release-assets/SHA256SUMS; do
            gh attestation verify "$asset" --repo "$GITHUB_REPOSITORY"
          done

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Create the release as a draft with every asset attached, then flip it
          # to published in one transition. With repository release immutability
          # enabled, a release freezes at publish time, so all assets must be in
          # place first — GitHub's documented draft-first ordering (audit F6).
          gh release create "$GITHUB_REF_NAME" \
            "release-assets/dediren-agent-bundle-${VERSION}.tar.xz" \
            "release-assets/dediren-${VERSION}.cdx.json" \
            "release-assets/dediren-${VERSION}.cdx.xml" \
            release-assets/SHA256SUMS \
            --draft \
            --verify-tag \
            --title "Dediren $GITHUB_REF_NAME" \
            --generate-notes
          gh release edit "$GITHUB_REF_NAME" --draft=false
