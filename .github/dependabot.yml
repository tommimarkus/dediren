version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Helsinki"
    groups:
      java-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Helsinki"
    # Actions that share a job must move in lockstep: codeql-action/init and
    # codeql-action/analyze fail with a configuration error when their versions
    # diverge, which is what happens when each lands in its own pull request.
    groups:
      github-actions:
        patterns:
          - "*"
