# SLF4J provider configuration for the packaged dediren CLI.
#
# Silent by default. Nothing here is load-bearing for agents: the command envelope on stdout is
# the contract, and logs are a human debugging aid only. Raise the level for one run with
# DEDIREN_LOG_LEVEL (the launcher maps it to org.slf4j.simpleLogger.defaultLogLevel, and a system
# property overrides this file).
org.slf4j.simpleLogger.defaultLogLevel=off

# The line that protects the agent contract. System.err is already slf4j-simple's default, but it
# is pinned explicitly because flipping it to System.out would interleave log text with the JSON
# envelope and break every agent that decides success from stdout alone.
org.slf4j.simpleLogger.logFile=System.err

# Compact, deterministic lines: the CLI is single-threaded per invocation, and a wall-clock stamp
# would make otherwise-identical debug output differ run to run.
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showLogName=true
org.slf4j.simpleLogger.levelInBrackets=true
